<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interest Calculator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Interest Calculator</h1>

    <div class="input-box">
      <label for="principal">Principal Amount (₹)</label>
      <input type="number" id="principal" placeholder="Enter principal amount" />
    </div>

    <div class="input-box">
      <label for="rate">Rate of Interest (%)</label>
      <input type="number" id="rate" placeholder="Enter rate of interest" />
    </div>

    <div class="input-box">
      <label for="time">Time (Years)</label>
      <input type="number" id="time" placeholder="Enter time in years" />
    </div>

    <button onclick="calculateInterest()">Calculate</button>

    <div class="result">
      <p><strong>Simple Interest:</strong> <span id="si">0</span></p>
      <p><strong>Total Amount:</strong> <span id="amount">0</span></p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
